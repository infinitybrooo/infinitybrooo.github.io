name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 84a5120877eae87f1af6b08f6adb4dd9
      COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'GitHub Actions deployment' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Cloudflare token
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: |
          echo "CLOUDFLARE_API_TOKEN is not configured. Add it in GitHub repository secrets, then rerun this workflow."

      - name: Deploy
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          npx wrangler pages deploy . \
            --project-name cheatguys-cloudflare \
            --branch main \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "${COMMIT_MESSAGE}"
